name: Promote Script Release

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Optional release tag to promote, for example codeforces-better-v1.86.0'
        required: false
        type: string
      min_age_hours:
        description: 'Minimum age before promotion. Use 0 to publish immediately.'
        required: true
        default: '24'
        type: string
      dry_run:
        description: 'Print what would be promoted without writing files.'
        required: true
        default: false
        type: boolean
      ignore_quiet_hours:
        description: 'Allow promotion during common contest hours.'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: promote-script-release
  cancel-in-progress: false

jobs:
  promote-script-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Promote eligible release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG_NAME: ${{ github.event.inputs.tag_name }}
          MIN_AGE_HOURS: ${{ github.event.inputs.min_age_hours || '24' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          IGNORE_QUIET_HOURS: ${{ github.event.inputs.ignore_quiet_hours || 'false' }}
        run: |
          node .github/scripts/promote-script-release.js
          git add script/dev/*.user.js script/release/*.user.js script/versions.json

      - name: Commit script release changes
        id: commit
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git stash push --include-untracked -m "Temporarily stash script release updates"
          git fetch origin main --tags
          git rebase origin/main
          git stash pop
          git add script/dev/*.user.js script/release/*.user.js script/versions.json
          git commit -m "Promote script release"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Install ossutil
        if: steps.commit.outputs.changed == 'true'
        run: |
          wget http://gosspublic.alicdn.com/ossutil/1.7.0/ossutil64
          chmod 755 ossutil64

      - name: Config ossutil
        if: steps.commit.outputs.changed == 'true'
        env:
          OSS_ENDPOINT: 'oss-cn-beijing.aliyuncs.com'
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          ./ossutil64 config -e $OSS_ENDPOINT -i $OSS_ACCESS_KEY_ID -k $OSS_ACCESS_KEY_SECRET

      - name: Sync scripts to OSS
        if: steps.commit.outputs.changed == 'true'
        env:
          OSS_BUCKET: 'aowuucdn'
        run: |
          ./ossutil64 sync -u -f ./script/ oss://$OSS_BUCKET/script/
